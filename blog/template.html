:root {
  --cyr-navy: #0A0A0A;
  --cyr-blue: #6E1919;
  --cyr-white: #FFFFFF;
  --cyr-steel: #7C8AA5;
  --cyr-border: #E4E4E0;
  --cyr-input: #D0D7E2;
  --cyr-surface: #FFFFFF;
  --cyr-surface-muted: #F7F9FC;
  --cyr-shadow: 0 2px 8px rgba(11,18,32,0.06);
  --cyr-radius-btn: 8px;
  --cyr-radius-card: 12px;
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  --space-xxl: 48px;
}
body {
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
  color: var(--cyr-navy) !important;
  background: var(--cyr-white) !important;
}
a { color: var(--cyr-blue); }
button, .btn, .cta-button, .cta-primary, .subscribe-btn, .demo-button {
  border-radius: var(--cyr-radius-btn) !important;
}
input, select, textarea, .search-input {
  border: 1px solid var(--cyr-input) !important;
  box-shadow: none !important;
}
input:focus, select:focus, textarea:focus, .search-input:focus {
  outline: 1px solid var(--cyr-blue) !important;
  border-color: var(--cyr-blue) !important;
}
.brand-shell .btn-primary,
.brand-shell .cta-primary,
.brand-shell .subscribe-btn,
.brand-shell .cta-button,
.brand-shell .demo-button,
.brand-shell .btn:not(.secondary) {
  background: var(--cyr-blue) !important;
  color: var(--cyr-white) !important;
  border: 0 !important;
  padding: 12px 16px !important;
  box-shadow: none !important;
}
.brand-shell .btn.secondary,
.brand-shell .cta-secondary,
.brand-shell .secondary,
.brand-shell a.cta-button[style*='transparent'] {
  background: transparent !important;
  color: var(--cyr-navy) !important;
  border: 1px solid var(--cyr-navy) !important;
}
.brand-shell .card, .brand-shell .feature-card, .brand-shell .stat-card, .brand-shell .pricing-card, .brand-shell .code-box, .brand-shell .related-card, .brand-shell .testimonial-container {
  background: var(--cyr-surface) !important;
  border: 1px solid var(--cyr-border) !important;
  border-radius: var(--cyr-radius-card) !important;
  box-shadow: var(--cyr-shadow) !important;
}
.cyrionyx-header {
  position: sticky;
  top: 0;
  z-index: 300;
  background: rgba(255,255,255,0.96);
  border-bottom: 1px solid var(--cyr-border);
  backdrop-filter: blur(12px);
}
.cyrionyx-header-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
}
.cyr-brand {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
  color: var(--cyr-navy);
  min-height: 24px;
}
.cyr-brand img {
  width: 24px;
  height: 24px;
  display: block;
}
.cyr-wordmark {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 0.03em;
  color: var(--cyr-navy);
  line-height: 1;
}
.cyr-wordmark .x { color: var(--cyr-blue); display: inline-block; transform: scaleX(1.03); }
.cyr-nav { display: flex; align-items: center; gap: 24px; }
.cyr-nav-link, .cyr-dropdown-toggle {
  color: var(--cyr-navy);
  text-decoration: none;
  font-weight: 500;
  font-size: 14px;
  background: transparent;
  border: 0;
  cursor: pointer;
  padding: 0;
}
.cyr-dropdown { position: relative; }
.cyr-dropdown-menu {
  position: absolute;
  right: 0;
  top: calc(100% + 12px);
  min-width: 220px;
  background: var(--cyr-white);
  border: 1px solid var(--cyr-border);
  border-radius: 12px;
  box-shadow: var(--cyr-shadow);
  padding: 8px;
  display: none;
}
.cyr-dropdown.open .cyr-dropdown-menu { display: block; }
.cyr-dropdown-menu a {
  display: block;
  padding: 12px 14px;
  border-radius: 8px;
  color: var(--cyr-navy);
  text-decoration: none;
  font-weight: 500;
}
.cyr-dropdown-menu a:hover { background: var(--cyr-surface-muted); }
.cyr-nav-link:hover, .cyr-nav-link.active, .cyr-dropdown-toggle:hover { color: var(--cyr-blue); }
.cyr-menu-button {
  display: none;
  width: 40px;
  height: 40px;
  border: 1px solid var(--cyr-border);
  border-radius: 8px;
  background: var(--cyr-white);
  color: var(--cyr-navy);
  font-size: 18px;
}
.cyr-mobile-drawer {
  display: none;
  border-top: 1px solid var(--cyr-border);
  background: var(--cyr-white);
  padding: 16px 24px 24px;
}
.cyr-mobile-drawer.open { display: block; }
.cyr-mobile-drawer a, .cyr-mobile-products-label {
  display: block;
  color: var(--cyr-navy);
  text-decoration: none;
  padding: 12px 0;
  font-weight: 500;
}
.cyr-mobile-products {
  padding-left: 16px;
}
.cyrionyx-footer {
  background: var(--cyr-navy);
  color: var(--cyr-white);
  margin-top: 48px;
}
.cyrionyx-footer-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 32px 24px;
}
.cyrionyx-footer-title {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.03em;
}
.cyrionyx-footer-copy {
  color: #CFCCC0;
  margin-top: 8px;
  font-size: 14px;
}
.cyrionyx-footer-products {
  margin-top: 16px;
  font-size: 14px;
  color: #CFCCC0;
  line-height: 1.8;
}
.cyrionyx-footer-products span { display: block; }
@media (max-width: 767px) {
  .cyrionyx-header-inner { padding: 12px 16px; }
  .cyr-brand img { width: 24px; height: 24px; }
  .cyr-wordmark { font-size: 15px; }
  .cyr-nav { display: none; }
  .cyr-menu-button { display: inline-flex; align-items: center; justify-content: center; }
}

</style>
</head>

<script>
(function(){
  document.querySelectorAll('.cyr-dropdown').forEach(function(drop){
    var btn = drop.querySelector('.cyr-dropdown-toggle');
    btn.addEventListener('click', function(e){
      e.stopPropagation();
      var open = drop.classList.toggle('open');
      btn.setAttribute('aria-expanded', open ? 'true' : 'false');
    });
  });
  document.querySelectorAll('[data-cyrionyx-header]').forEach(function(header){
    var btn = header.querySelector('.cyr-menu-button');
    var drawer = header.querySelector('.cyr-mobile-drawer');
    if (btn && drawer) {
      btn.addEventListener('click', function(){ drawer.classList.toggle('open'); });
    }
  });
  document.addEventListener('click', function(){
    document.querySelectorAll('.cyr-dropdown.open').forEach(function(drop){
      drop.classList.remove('open');
      var btn = drop.querySelector('.cyr-dropdown-toggle');
      if (btn) btn.setAttribute('aria-expanded', 'false');
    });
  });
})();
</script>
