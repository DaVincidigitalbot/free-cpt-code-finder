services:
  - type: web
    name: freecptcodefinder-assistant
    runtime: node
    rootDir: assistant-backend
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: ALLOWED_ORIGINS
        value: https://freecptcodefinder.com,https://www.freecptcodefinder.com
